<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    /* 1. Original layout styles from demo.html */
    body {
      margin: 0;
      padding: 40px;
      background-color: #000000;
      min-height: 100vh;
    }
    .container {
      max-width: 1200px;
      margin: 0 auto;
    }
    h1 {
      color: white;
      font-family: sans-serif;
      margin-bottom: 24px;
    }

  /*
 * NoorVest Fee Calculator Widget Styles
 * Standalone CSS for embeddable widget
 * All classes scoped to .nv-fee-calculator-widget
 */

/* CSS Reset for widget container */
.nv-fee-calculator-widget,
.nv-fee-calculator-widget *,
.nv-fee-calculator-widget *::before,
.nv-fee-calculator-widget *::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}
/*fix */
.text-2xl.font-bold.text-white {
    overflow-wrap: anywhere;
    white-space: normal;
}

.nv-fee-calculator-widget .text-2xl.font-bold.text-white,
.nv-fee-calculator-widget .text-sm.text-nv-gray-light.mt-1 {
    max-width: 100%;
    white-space: normal;
    overflow-wrap: anywhere;
    word-break: break-word;
}


@media screen and (max-width: 480px) {
  .container,
  #fee-calculator,
  .nv-fee-calculator-widget {
    width: 100% !important;
    max-width: 100% !important;
    min-width: 100% !important;
    margin-left: 0 !important;
    margin-right: 0 !important;
    box-sizing: border-box !important;
  }

  .container,
  #fee-calculator {
    padding-left: 0 !important;
    padding-right: 0 !important;
  }

  .nv-fee-calculator-widget {
    padding-left: 12px !important;
    padding-right: 12px !important;
  }
}


/* ipad */

@media screen and (min-width: 768px) and (max-width: 1024px) {
  .nv-fee-calculator-widget .flex.items-center.gap-4 {
    flex-wrap: wrap !important;
  }

  .nv-fee-calculator-widget .w-20.text-right.text-lg.font-semibold.text-white {
    width: 100% !important;
    text-align: left !important;
    margin-top: 6px !important;
  }
}



/* Responsive padding */

body {
  margin: 0;
  padding: 40px;
  background-color: #000000;
  min-height: 100vh;
}

@media screen and (max-width: 768px) {
  body {
    padding: 20px;
  }
}

@media screen and (max-width: 400px) {
  body {
    padding: 12px;
  }
}


/* Root widget container */
.nv-fee-calculator-widget {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  font-size: 16px;
  line-height: 1.5;
  color: #A3A3A3;
  background-color: #101010;
  padding: 2rem;
  border-radius: 1rem;
}

/* Brand Colors */
:root {
  --nv-black: #101010;
  --nv-green: #95DF00;
  --nv-orange: #FBB03B;
  --nv-gray-dark: #2B2B2B;
  --nv-gray: #414141;
  --nv-gray-light: #A3A3A3;
}

/* Typography */
.nv-fee-calculator-widget h1,
.nv-fee-calculator-widget h2,
.nv-fee-calculator-widget h3 {
  font-family: 'Manrope', 'Inter', sans-serif;
  font-weight: 700;
  color: white;
}

/* Spacing utilities */
.nv-fee-calculator-widget .space-y-8 > * + * {
  margin-top: 2rem;
}

.nv-fee-calculator-widget .space-y-6 > * + * {
  margin-top: 1.5rem;
}

.nv-fee-calculator-widget .space-y-4 > * + * {
  margin-top: 1rem;
}

.nv-fee-calculator-widget .space-y-2 > * + * {
  margin-top: 0.5rem;
}

.nv-fee-calculator-widget .gap-2 {
  gap: 0.5rem;
}

.nv-fee-calculator-widget .gap-4 {
  gap: 1rem;
}

.nv-fee-calculator-widget .gap-6 {
  gap: 1.5rem;
}

/* Flex utilities */
.nv-fee-calculator-widget .flex {
  display: flex;
}

.nv-fee-calculator-widget .flex-1 {
  flex: 1 1 0%;
}

.nv-fee-calculator-widget .items-center {
  align-items: center;
}

.nv-fee-calculator-widget .justify-between {
  justify-content: space-between;
}

.nv-fee-calculator-widget .inline-flex {
  display: inline-flex;
}

/* Grid utilities */
.nv-fee-calculator-widget .grid {
  display: grid;
}

.nv-fee-calculator-widget .grid-cols-1 {
  grid-template-columns: repeat(1, minmax(0, 1fr));
}

/* sm: breakpoint (640px) */
@media (min-width: 640px) {
  .nv-fee-calculator-widget .sm\:grid-cols-2 {
    grid-template-columns: repeat(2, minmax(0, 1fr));
  }
}

/* md: breakpoint (768px) */
@media (min-width: 768px) {
  .nv-fee-calculator-widget .md\:grid-cols-2 {
    grid-template-columns: repeat(2, minmax(0, 1fr));
  }

  .nv-fee-calculator-widget .md\:grid-cols-3 {
    grid-template-columns: repeat(3, minmax(0, 1fr));
  }
}

/* lg: breakpoint (1024px) */
@media (min-width: 1024px) {
  .nv-fee-calculator-widget .lg\:grid-cols-4 {
    grid-template-columns: repeat(4, minmax(0, 1fr));
  }
}

/* Text utilities */
.nv-fee-calculator-widget .text-center {
  text-align: center;
}

.nv-fee-calculator-widget .text-right {
  text-align: right;
}

.nv-fee-calculator-widget .text-left {
  text-align: left;
}

.nv-fee-calculator-widget .text-white {
  color: white;
}

.nv-fee-calculator-widget .text-nv-green {
  color: var(--nv-green);
}

.nv-fee-calculator-widget .text-nv-orange {
  color: var(--nv-orange);
}

.nv-fee-calculator-widget .text-nv-gray-light {
  color: var(--nv-gray-light);
}

.nv-fee-calculator-widget .text-xs {
  font-size: 0.75rem;
  line-height: 1rem;
}

.nv-fee-calculator-widget .text-sm {
  font-size: 0.875rem;
  line-height: 1.25rem;
}

.nv-fee-calculator-widget .text-lg {
  font-size: 1.125rem;
  line-height: 1.75rem;
}

.nv-fee-calculator-widget .text-xl {
  font-size: 1.25rem;
  line-height: 1.75rem;
}

.nv-fee-calculator-widget .text-2xl {
  font-size: 1.5rem;
  line-height: 2rem;
}

.nv-fee-calculator-widget .text-3xl {
  font-size: 1.875rem;
  line-height: 2.25rem;
}

.nv-fee-calculator-widget .font-medium {
  font-weight: 500;
}

.nv-fee-calculator-widget .font-semibold {
  font-weight: 600;
}

.nv-fee-calculator-widget .font-bold {
  font-weight: 700;
}

/* Background utilities */
.nv-fee-calculator-widget .bg-nv-black {
  background-color: var(--nv-black);
}

.nv-fee-calculator-widget .bg-nv-gray-dark {
  background-color: var(--nv-gray-dark);
}

.nv-fee-calculator-widget .bg-nv-gray {
  background-color: var(--nv-gray);
}

.nv-fee-calculator-widget .bg-nv-green\/10 {
  background-color: rgba(149, 223, 0, 0.1);
}

.nv-fee-calculator-widget .bg-nv-green\/20 {
  background-color: rgba(149, 223, 0, 0.2);
}

.nv-fee-calculator-widget .bg-nv-orange\/10 {
  background-color: rgba(251, 176, 59, 0.1);
}

.nv-fee-calculator-widget .bg-black\/70 {
  background-color: rgba(0, 0, 0, 0.7);
}

/* Border utilities */
.nv-fee-calculator-widget .border {
  border-width: 1px;
  border-style: solid;
}

.nv-fee-calculator-widget .border-b {
  border-bottom-width: 1px;
  border-bottom-style: solid;
}

.nv-fee-calculator-widget .border-nv-gray {
  border-color: var(--nv-gray);
}

.nv-fee-calculator-widget .border-nv-gray\/50 {
  border-color: rgba(65, 65, 65, 0.5);
}

.nv-fee-calculator-widget .border-nv-green {
  border-color: var(--nv-green);
}

.nv-fee-calculator-widget .border-nv-orange {
  border-color: var(--nv-orange);
}

/* Padding utilities */
.nv-fee-calculator-widget .p-4 {
  padding: 1rem;
}

.nv-fee-calculator-widget .p-6 {
  padding: 1.5rem;
}

.nv-fee-calculator-widget .px-2 {
  padding-left: 0.5rem;
  padding-right: 0.5rem;
}

.nv-fee-calculator-widget .px-4 {
  padding-left: 1rem;
  padding-right: 1rem;
}

.nv-fee-calculator-widget .py-1 {
  padding-top: 0.25rem;
  padding-bottom: 0.25rem;
}

.nv-fee-calculator-widget .py-2 {
  padding-top: 0.5rem;
  padding-bottom: 0.5rem;
}

.nv-fee-calculator-widget .py-3 {
  padding-top: 0.75rem;
  padding-bottom: 0.75rem;
}

.nv-fee-calculator-widget .pb-2 {
  padding-bottom: 0.5rem;
}

.nv-fee-calculator-widget .pl-8 {
  padding-left: 2rem;
}

.nv-fee-calculator-widget .pr-4 {
  padding-right: 1rem;
}

/* Margin utilities */
.nv-fee-calculator-widget .mb-2 {
  margin-bottom: 0.5rem;
}

.nv-fee-calculator-widget .mb-4 {
  margin-bottom: 1rem;
}

.nv-fee-calculator-widget .mt-2 {
  margin-top: 0.5rem;
}

.nv-fee-calculator-widget .mt-4 {
  margin-top: 1rem;
}

.nv-fee-calculator-widget .mx-4 {
  margin-left: 1rem;
  margin-right: 1rem;
}

.nv-fee-calculator-widget .mx-auto {
  margin-left: auto;
  margin-right: auto;
}

/* Width utilities */
.nv-fee-calculator-widget .w-full {
  width: 100%;
}

.nv-fee-calculator-widget .w-4 {
  width: 1rem;
}

.nv-fee-calculator-widget .w-5 {
  width: 1.25rem;
}

.nv-fee-calculator-widget .w-16 {
  width: 4rem;
}

.nv-fee-calculator-widget .w-20 {
  width: 5rem;
}

.nv-fee-calculator-widget .max-w-md {
  max-width: 28rem;
}

.nv-fee-calculator-widget .max-w-2xl {
  max-width: 42rem;
}

/* Height utilities */
.nv-fee-calculator-widget .h-2 {
  height: 0.5rem;
}

.nv-fee-calculator-widget .h-4 {
  height: 1rem;
}

.nv-fee-calculator-widget .h-5 {
  height: 1.25rem;
}

.nv-fee-calculator-widget .h-64 {
  height: 16rem;
}

/* Border radius */
.nv-fee-calculator-widget .rounded {
  border-radius: 0.25rem;
}

.nv-fee-calculator-widget .rounded-lg {
  border-radius: 0.5rem;
}

.nv-fee-calculator-widget .rounded-xl {
  border-radius: 0.75rem;
}

/* Position utilities */
.nv-fee-calculator-widget .relative {
  position: relative;
}

.nv-fee-calculator-widget .absolute {
  position: absolute;
}

.nv-fee-calculator-widget .fixed {
  position: fixed;
}

.nv-fee-calculator-widget .inset-0 {
  top: 0;
  right: 0;
  bottom: 0;
  left: 0;
}

.nv-fee-calculator-widget .top-4 {
  top: 1rem;
}

.nv-fee-calculator-widget .right-4 {
  right: 1rem;
}

.nv-fee-calculator-widget .left-3 {
  left: 0.75rem;
}

.nv-fee-calculator-widget .top-1\/2 {
  top: 50%;
}

.nv-fee-calculator-widget .-translate-y-1\/2 {
  transform: translateY(-50%);
}

/* Z-index */
.nv-fee-calculator-widget .z-50 {
  z-index: 50;
}

/* Shadow */
.nv-fee-calculator-widget .shadow-xl {
  box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1);
}

/* Display utilities */
.nv-fee-calculator-widget .block {
  display: block;
}

/* Transitions */
.nv-fee-calculator-widget .transition-colors {
  transition-property: color, background-color, border-color;
  transition-timing-function: cubic-bezier(0.4, 0, 0.2, 1);
  transition-duration: 150ms;
}

/* Hover states */
.nv-fee-calculator-widget .hover\:text-white:hover {
  color: white;
}

.nv-fee-calculator-widget .hover\:text-nv-green\/80:hover {
  color: rgba(149, 223, 0, 0.8);
}

/* Underline utilities */
.nv-fee-calculator-widget .underline {
  text-decoration: underline;
}

.nv-fee-calculator-widget .underline-offset-2 {
  text-underline-offset: 2px;
}

/* Form elements */
.nv-fee-calculator-widget input[type="range"] {
  height: 0.5rem;
  background-color: var(--nv-gray);
  border-radius: 0.5rem;
  appearance: none;
  cursor: pointer;
}

.nv-fee-calculator-widget input[type="range"]::-webkit-slider-thumb {
  appearance: none;
  width: 1.25rem;
  height: 1.25rem;
  background-color: var(--nv-green);
  border-radius: 50%;
  cursor: pointer;
}

.nv-fee-calculator-widget input[type="range"]::-moz-range-thumb {
  width: 1.25rem;
  height: 1.25rem;
  background-color: var(--nv-green);
  border-radius: 50%;
  border: none;
  cursor: pointer;
}

.nv-fee-calculator-widget input[type="text"] {
  width: 100%;
  padding: 0.75rem 1rem 0.75rem 2rem;
  background-color: var(--nv-gray-dark);
  border: 1px solid var(--nv-gray);
  border-radius: 0.5rem;
  color: white;
  font-size: 1.125rem;
  font-weight: 600;
  outline: none;
}

.nv-fee-calculator-widget input[type="text"]:focus {
  border-color: var(--nv-green);
}

/* Button styles */
.nv-fee-calculator-widget button {
  background: none;
  border: none;
  cursor: pointer;
  font-family: inherit;
}

/* Table styles */
.nv-fee-calculator-widget table {
  width: 100%;
  border-collapse: collapse;
}

.nv-fee-calculator-widget th,
.nv-fee-calculator-widget td {
  text-align: left;
}

/* SVG utilities */
.nv-fee-calculator-widget svg {
  display: inline-block;
  vertical-align: middle;
}

/* Card component (from globals.css) */
.nv-fee-calculator-widget .card {
  background-color: var(--nv-gray-dark);
  border: 1px solid var(--nv-gray);
  border-radius: 0.75rem;
  padding: 1.5rem;
}

/* Accent colors for inputs */
.nv-fee-calculator-widget .accent-nv-green {
  accent-color: var(--nv-green);
}

      "*"
